name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  examples:
    name: cargo check (examples)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: riscv32imac-unknown-none-elf
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: examples
      - name: cargo fmt --check
        working-directory: examples
        run: cargo fmt --all -- --check
      - name: cargo check --workspace (default = probe-rs/defmt)
        working-directory: examples
        run: cargo check --workspace
      - name: cargo check (espflash feature)
        working-directory: examples
        run: |
          for c in blinky button uart i2c spi embassy-tasks channel wifi ble esp-now \
                   twai sleep adc-pwm keymatrix ble-hid sensor-node https rmt-ws2812 \
                   pcnt etm ledc-fade final-wireless-button; do
            cargo check -p "$c" --no-default-features --features espflash
          done
      - name: host tests (final-wireless-button protocol)
        working-directory: examples
        # .cargo/config.toml の既定ターゲットは riscv32imac(no_std) なので、
        # ホストで走らせる純粋ロジックのテストはホストターゲットを明示する。
        run: cargo test -p final-wireless-button --lib --target x86_64-unknown-linux-gnu

  site:
    name: build site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: site/package-lock.json
      - name: Install dependencies
        working-directory: site
        run: npm ci
      - name: Build site
        working-directory: site
        run: npm run build
